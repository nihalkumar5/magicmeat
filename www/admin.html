<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MagicMeat Admin | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #C62828; --primary-dark: #A52121; --primary-light: #FFEBEE;
      --ink: #0F172A; --ink-soft: #475569; --muted: #94A3B8; --paper: #FFFFFF;
      --surface: #F8FAFC; --border: rgba(0,0,0,0.06); --r-md: 12px; --r-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--surface); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    
    /* LOGIN SCREEN */
    #loginScreen { position: fixed; inset: 0; z-index: 1000; background: var(--surface); display: flex; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.3s; }
    #loginScreen.hidden { opacity: 0; pointer-events: none; }
    .login-card { width: 100%; max-width: 400px; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 16px; transition: border-color 0.2s; }
    .login-card input:focus { border-color: var(--primary); outline: none; }
    .login-card button { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
    .login-card button:active { transform: scale(0.97); }

    /* LAYOUT */
    #adminShell { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 100; transition: transform 0.3s ease; }
    .sidebar-header { margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .sidebar-logo { width: 40px; height: 40px; background: var(--primary); color: #fff; border-radius: 10px; display: grid; place-items: center; font-weight: 800; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: var(--ink-soft); font-weight: 600; text-decoration: none; margin-bottom: 4px; cursor: pointer; transition: all 0.2s; }
    .nav-item:hover { background: var(--surface); color: var(--ink); }
    .nav-item.active { background: var(--primary-light); color: var(--primary); }
    .main-content { flex: 1; padding: 40px; max-width: 1200px; }
    
    /* DASHBOARD CARDS */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
    .stat-card span { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card h3 { font-size: 28px; font-weight: 800; margin-top: 8px; }

    /* TABLES & FORMS */
    .card-full { background: #fff; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 32px; }
    .card-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 18px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 16px 24px; background: var(--surface); font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    td { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-badge.pending { background: #fff7ed; color: #c2410c; }
    .status-badge.delivered { background: #f0fdf4; color: #15803d; }
    
    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: #fff; width: 100%; max-width: 500px; border-radius: 24px; padding: 32px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🥩</div>
    <h1>Admin Access</h1>
    <input type="password" id="loginPass" placeholder="Enter Admin Password">
    <button id="loginBtn">Unlock Dashboard</button>
  </div>
</div>

<div id="adminShell" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">M</div>
      <h2 style="font-size: 18px; font-weight: 800;">MagicMeat</h2>
    </div>
    <nav>
      <div class="nav-item active" data-page="dash">Dashboard</div>
      <div class="nav-item" data-page="products">Products</div>
      <div class="nav-item" data-page="orders">Orders</div>
      <div class="nav-item" data-page="categories">Categories</div>
      <div class="nav-item" data-page="settings">Settings</div>
    </nav>
    <div style="margin-top: auto;">
      <button id="logoutBtn" style="color: var(--primary); font-weight: 700;">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div id="pg-dash" class="page active">
      <div class="stats-row">
        <div class="stat-card"><span>Revenue</span><h3 id="statRevenue">₹0</h3></div>
        <div class="stat-card"><span>Orders</span><h3 id="statOrders">0</h3></div>
        <div class="stat-card"><span>Products</span><h3 id="statProducts">0</h3></div>
      </div>
      <div class="card-full">
        <div class="card-header"><h2>Recent Orders</h2></div>
        <div id="recentOrders"></div>
      </div>
    </div>

    <div id="pg-products" class="page" style="display: none;">
      <div class="card-header">
        <h2>Products</h2>
        <button id="addProductBtn" style="background: var(--ink); color: #fff; padding: 8px 16px; border-radius: 8px;">+ Add Product</button>
      </div>
      <div class="card-full">
        <div id="productsTable"></div>
      </div>
    </div>

    <div id="pg-orders" class="page" style="display: none;">
      <div class="card-header"><h2>All Orders</h2></div>
      <div class="card-full"><div id="ordersTable"></div></div>
    </div>
  </main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal-card">
    <h2 id="modalTitle" style="margin-bottom: 20px;">Add Product</h2>
    <div class="form-group"><label>Name</label><input type="text" id="pName"></div>
    <div class="form-group"><label>Price (₹)</label><input type="number" id="pPrice"></div>
    <div class="form-group"><label>Unit (e.g. 500g)</label><input type="text" id="pUnit"></div>
    <div class="form-group"><label>Image URL</label><input type="text" id="pImage"></div>
    <div class="form-group"><label>Category</label><select id="pCategory"></select></div>
    <div style="display: flex; gap: 10px; margin-top: 24px;">
      <button id="saveProduct" style="flex: 1; background: var(--primary); color: #fff; padding: 12px; border-radius: 10px; font-weight: 700;">Save</button>
      <button onclick="document.getElementById('productModal').classList.remove('show')" style="flex: 1; background: var(--surface); padding: 12px; border-radius: 10px;">Cancel</button>
    </div>
  </div>
</div>

<script>
const SB_URL = "https://cchrlbgffpqauwgzszia.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjaHJsYmdmZnBxYXV3Z3pzemlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjIwNzgsImV4cCI6MjA5MjUzODA3OH0.UQAQohGU9VQ6R6z9rRMZFLuZxt2KFVAusOaU5GydlXA";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

let products = [], categories = [], orders = [];

async function fetchAll() {
  const { data: ps } = await supabase.from('products').select('*').order('created_at', { ascending: false });
  const { data: cs } = await supabase.from('categories').select('*').order('id');
  const { data: os } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
  products = ps || []; categories = cs || []; orders = os || [];
  renderAll();
}

function renderAll() {
  document.getElementById("statProducts").textContent = products.length;
  document.getElementById("statOrders").textContent = orders.length;
  const rev = orders.reduce((s, o) => s + (parseFloat(o.total) || 0), 0);
  document.getElementById("statRevenue").textContent = `₹${rev.toLocaleString("en-IN")}`;

  document.getElementById("recentOrders").innerHTML = `<table><thead><tr><th>#</th><th>Total</th><th>Status</th></tr></thead><tbody>${
    orders.slice(0, 10).map(o => `<tr><td>#${o.id.toString().slice(-6)}</td><td>₹${o.total}</td><td><span class="status-badge ${o.status}">${o.status}</span></td></tr>`).join("")
  }</tbody></table>`;

  document.getElementById("productsTable").innerHTML = `<table><thead><tr><th>Name</th><th>Price</th><th>Category</th><th>Actions</th></tr></thead><tbody>${
    products.map(p => `<tr><td>${p.name}</td><td>₹${p.price}</td><td>${p.category}</td><td><button onclick="deleteProduct('${p.id}')" style="color:red">Delete</button></td></tr>`).join("")
  }</tbody></table>`;

  document.getElementById("pCategory").innerHTML = categories.map(c => `<option value="${c.id}">${c.label}</option>`).join("");
}

async function deleteProduct(id) {
  if(confirm("Delete product?")) {
    await supabase.from('products').delete().eq('id', id);
    fetchAll();
  }
}

document.getElementById("saveProduct").onclick = async () => {
  const p = {
    id: document.getElementById("pName").value.toLowerCase().replace(/ /g, '-'),
    name: document.getElementById("pName").value,
    price: parseFloat(document.getElementById("pPrice").value),
    unit: document.getElementById("pUnit").value,
    image_url: document.getElementById("pImage").value,
    category: document.getElementById("pCategory").value,
    color: '#C62828'
  };
  await supabase.from('products').insert(p);
  document.getElementById("productModal").classList.remove("show");
  fetchAll();
};

document.getElementById("loginBtn").onclick = () => {
  if(document.getElementById("loginPass").value === 'admin123') {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("adminShell").classList.remove("hidden");
    fetchAll();
  } else { alert("Wrong password"); }
};

document.querySelectorAll(".nav-item").forEach(item => {
  item.onclick = () => {
    document.querySelectorAll(".page").forEach(p => p.style.display = 'none');
    document.getElementById(`pg-${item.dataset.page}`).style.display = 'block';
    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    item.classList.add("active");
  };
});

document.getElementById("addProductBtn").onclick = () => document.getElementById("productModal").classList.add("show");
document.getElementById("logoutBtn").onclick = () => location.reload();
</script>
</body>
</html>
